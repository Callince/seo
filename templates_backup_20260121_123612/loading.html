{% extends "base.html" %}

{% block title %}Crawling in Progress{% endblock %}

{% block content %}
<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="text-center mb-4">
            <h1 class="mb-3">Website Crawler</h1>
            <div class="d-flex justify-content-center align-items-center mb-3">
              <div class="spinner-border me-3" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
              <h3 id="status-text">Crawling in progress...</h3>
            </div>
          </div>

          <!-- Progress Bar -->
          <div class="progress mb-3" style="height: 25px;">
            <div id="progress-bar" class="progress-bar" 
                 role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
              0%
            </div>
          </div>

          <div id="status-message" class="text-center mb-4">Initializing crawler...</div>

          <!-- Crawl Info -->
          <div class="card mb-4">
            <div class="card-header fw-bold">Crawl Information</div>
            <div class="card-body">
              <div class="row">
                <div class="col-sm-6">
                  <p class="mb-1"><strong>Target URL:</strong></p>
                  <div id="target-url" class="border rounded p-2 bg-light text-truncate">Loading...</div>
                </div>
                <div class="col-sm-6">
                  <p><strong>Elapsed Time:</strong> <span id="elapsed-time">0.0</span> seconds</p>
                  <p><strong>Status:</strong> <span id="crawl-status" class="fw-bold text-warning">Running</span></p>
                </div>
              </div>
            </div>
          </div>

          <!-- Action Buttons -->
          <div class="d-flex justify-content-between align-items-center">
            <button id="cancel-btn" class="btn btn-outline-danger hover-border-btn">Cancel</button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary hover-border-btn">Back to Home</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  /* Custom color scheme */
  :root {
    --primary-color: #273879;
    --secondary-color: #0f74b2;
  }

  /* Uniform progress bar styling */
  .progress {
    background-color: #e9ecef;
    border-radius: 8px;
    overflow: hidden;
  }
  
  .progress-bar {
    background: linear-gradient(90deg, var(--primary-color) 0%, var(--secondary-color) 100%) !important;
    border-radius: 8px;
    transition: width 0.3s ease;
    font-weight: 600;
    color: white;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
  }

  /* Spinner styling */
  .spinner-border {
    color: var(--secondary-color) !important;
    width: 2rem;
    height: 2rem;
  }

  /* Text colors */
  #status-text {
    color: var(--primary-color) !important;
    font-weight: 600;
  }
  
  #status-message {
    color: var(--secondary-color) !important;
    font-weight: 500;
  }

  /* Card styling improvements */
  .card {
    border: 1px solid rgba(39, 56, 121, 0.1);
    border-radius: 12px;
  }

  .card-header {
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    color: white;
    border-radius: 12px 12px 0 0 !important;
  }

  /* Custom scrollbar for webkit browsers */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }

  ::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 10px;
  }

  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, var(--primary-color) 0%, var(--secondary-color) 100%);
    border-radius: 10px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--primary-color);
  }

  /* Hover border effect for buttons */
  .hover-border-btn {
    position: relative;
    transition: all 0.3s ease;
    border: 2px solid transparent !important;
  }

  .hover-border-btn.btn-outline-danger {
    color: #dc3545;
    border-color: #dc3545 !important;
  }

  .hover-border-btn.btn-outline-secondary {
    color: #6c757d;
    border-color: #6c757d !important;
  }

  .hover-border-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
    border-width: 3px !important;
  }

  .hover-border-btn.btn-outline-danger:hover {
    border-color: #dc3545 !important;
    background-color: rgba(220, 53, 69, 0.1);
  }

  .hover-border-btn.btn-outline-secondary:hover {
    border-color: #6c757d !important;
    background-color: rgba(108, 117, 125, 0.1);
  }

  @media (max-width: 768px) {
    h1 { font-size: 1.5rem; }
    h3 { font-size: 1.2rem; }
    .btn { padding: 12px; margin-bottom: 10px; }
    .progress { height: 20px; }
    .text-truncate { max-width: 100%; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .d-flex.justify-content-between { flex-direction: column; }
  }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const progressBar = document.getElementById('progress-bar');
  const statusMessage = document.getElementById('status-message');
  const targetUrl = document.getElementById('target-url');
  const elapsedTime = document.getElementById('elapsed-time');
  const statusText = document.getElementById('status-text');
  const crawlStatus = document.getElementById('crawl-status');
  const cancelBtn = document.getElementById('cancel-btn');

  const jobId = "{{ job_id }}";
  let completed = false;

  function updateProgress() {
    if (completed) return;

    fetch(`/progress/${jobId}`)
      .then(response => response.json())
      .then(data => {
        progressBar.style.width = `${data.progress}%`;
        progressBar.textContent = `${Math.round(data.progress)}%`;
        progressBar.setAttribute('aria-valuenow', data.progress);

        elapsedTime.textContent = data.elapsed;
        targetUrl.textContent = data.url;

        if (data.progress < 20) {
          statusMessage.textContent = "Connecting to website...";
        } else if (data.progress < 40) {
          statusMessage.textContent = "Scanning pages...";
        } else if (data.progress < 60) {
          statusMessage.textContent = "Extracting links...";
        } else if (data.progress < 80) {
          statusMessage.textContent = "Processing data...";
        } else {
          statusMessage.textContent = "Finalizing results...";
        }

        if (data.status === 'completed') {
          completed = true;
          progressBar.style.width = '100%';
          progressBar.textContent = '100%';
          statusText.textContent = "Crawling completed!";
          crawlStatus.textContent = "Completed";
          crawlStatus.className = "fw-bold text-success";
          statusMessage.textContent = "Redirecting to results...";
          setTimeout(() => { window.location.href = "/visualize"; }, 2000);
        } else if (data.status === 'failed') {
          completed = true;
          statusText.textContent = "Crawling failed!";
          crawlStatus.textContent = "Failed";
          crawlStatus.className = "fw-bold text-danger";
          statusMessage.textContent = "There was an error. Please try again.";
        }
      })
      .catch(error => console.error('Error fetching progress:', error));
  }

  updateProgress();
  const progressInterval = setInterval(() => {
    if (completed) clearInterval(progressInterval);
    else updateProgress();
  }, 1000);

  cancelBtn.addEventListener('click', function() {
    clearInterval(progressInterval);
    window.location.href = "/site_structure";
  });
});
</script>
{% endblock %}
